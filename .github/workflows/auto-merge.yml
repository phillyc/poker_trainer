name: Auto-merge

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check labels and merge
        run: |
          PR_LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          
          if echo "$PR_LABELS" | grep -q "trust:p2"; then
            echo "p2 PR — attempting auto-merge"
            gh pr merge --admin --merge
          elif echo "$PR_LABELS" | grep -q "trust:p3"; then
            echo "p3 PR — attempting auto-merge"
            gh pr merge --admin --merge
          else
            echo "Not a p2/p3 PR — skipping auto-merge"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
