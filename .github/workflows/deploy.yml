name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Collect build output into a temp dir
          BUILD_DIR=$(mktemp -d)
          cp index.html app.js styles.css components.css design-tokens.css presets.json "$BUILD_DIR/"

          # Clone gh-pages branch (shallow)
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages-dir

          cd gh-pages-dir

          # Remove everything EXCEPT the preview/ directory and .git
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'preview' -exec rm -rf {} +

          # Copy fresh build output
          cp "$BUILD_DIR"/* .

          # Commit and push
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy main branch — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin gh-pages
          fi
